name: Update bight formula

on:
  workflow_call:
    inputs:
      version:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string
    secrets:
      tap_token:
        description: "Token with write access to this tap repo"
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.tap_token || github.token }}
          repository: AndrewADev/homebrew-tap

      - name: Install task
        run: sh -c "$(curl -ssL https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - name: Render formula
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format"
            exit 1
          fi
          task render-formula VERSION="${VERSION#v}"

      - name: Commit and push
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/bight.rb
          git commit -m "Update bight to $VERSION"
          git push
